<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="L7S Inc. Logo">
  <title>L7S Inc.</title>
  <desc>L7S Inc. — L7S Hero S.O.S.™ Business Platform</desc>

  <!-- Background: obsidian black -->
  <rect width="200" height="200" rx="22" fill="#dc2626"/>
  <rect x="6" y="6" width="188" height="188" rx="17" fill="#000000"/>

  <!-- White L — vertical bar -->
  <rect x="35" y="26" width="20" height="116" fill="#ffffff"/>
  <!-- White L — horizontal foot (extends right) -->
  <rect x="35" y="122" width="96" height="20" fill="#ffffff"/>

  <!-- Red 7 — horizontal top bar -->
  <rect x="80" y="58" width="85" height="20" fill="#dc2626"/>
  <!-- Red 7 — vertical leg -->
  <rect x="145" y="58" width="20" height="112" fill="#dc2626"/>
</svg>
