<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 80" width="480" height="80" role="img" aria-label="L7S Hero Logo">
  <title>L7S Hero — L7S Inc.</title>

  <!-- Icon mark scaled to 80×80 -->
  <g transform="scale(0.4)">
    <rect width="200" height="200" rx="22" fill="#dc2626"/>
    <rect x="6" y="6" width="188" height="188" rx="17" fill="#0f172a"/>
    <rect x="35" y="26" width="20" height="116" fill="#ffffff"/>
    <rect x="35" y="122" width="96" height="20" fill="#ffffff"/>
    <rect x="80" y="58" width="85" height="20" fill="#dc2626"/>
    <rect x="145" y="58" width="20" height="112" fill="#dc2626"/>
  </g>

  <!-- L7S text -->
  <text
    x="96"
    y="50"
    font-family="system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="42"
    letter-spacing="4"
    fill="#0f172a">L7S</text>

  <!-- HERO text -->
  <text
    x="200"
    y="50"
    font-family="system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif"
    font-weight="700"
    font-size="42"
    letter-spacing="4"
    fill="#dc2626">HERO</text>

  <!-- INC. tagline -->
  <text
    x="97"
    y="68"
    font-family="system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif"
    font-weight="600"
    font-size="11"
    letter-spacing="6"
    fill="#64748b">L7S INC. — HERO S.O.S.™</text>
</svg>
